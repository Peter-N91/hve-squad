name: Sync and Adapt

# Runs every morning at 06:00 UTC or on demand.
#
# What it does:
#   1. Gets the latest deployment SHA from microsoft/hve-core.
#   2. Reads the SHA currently pinned in apm.yml (from the first hve-core entry).
#   3. Skips if already up to date (unless force=true).
#   4. Runs Update-ApmDependencies.ps1 -Ref <new_sha>, which:
#        - clones microsoft/hve-core at that exact SHA
#        - rewrites all microsoft/hve-core entries with the new SHA
#        - auto-detects the GitHub owner for squad entries
#        - updates apm.lock.yaml
#   5. Sets author: in apm.yml to the repo owner.
#   6. Commits and pushes directly to main.
#
# No local hve-core mirror involved — all content is referenced directly
# from microsoft/hve-core at a pinned commit SHA.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if hve-core SHA is already current'
        type: boolean
        default: false
      dry_run:
        description: 'Print what would change without committing'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-and-adapt:
    name: Sync hve-core SHA + adapt paths
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # ── Resolve latest hve-core deployment SHA ────────────────────────────
      - name: Get latest hve-core deployment SHA
        id: latest
        env:
          GH_TOKEN: ${{ secrets.HVE_CORE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY=$(gh api 'repos/microsoft/hve-core/deployments?per_page=1' --jq '.[0]')
          SHA=$(echo "$DEPLOY" | jq -r '.sha')
          SHORT_SHA=${SHA:0:7}
          echo "sha=$SHA"             >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Latest hve-core deployment: ${SHORT_SHA} (${SHA})"

      # ── Read SHA currently pinned in apm.yml ─────────────────────────────
      - name: Read current pinned SHA
        id: current
        run: |
          # Grab the SHA from the first microsoft/hve-core entry (after the #)
          SHA=$(grep -m1 'microsoft/hve-core/.*#' apm.yml | sed 's/.*#//' | tr -d '[:space:]' || true)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Current pinned SHA: ${SHA:-<none>}"

      # ── Skip if already up to date ────────────────────────────────────────
      - name: Check if update is needed
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.sha }}"
          LATEST="${{ steps.latest.outputs.sha }}"
          FORCE="${{ inputs.force }}"
          if [[ "$CURRENT" == "$LATEST" && "$FORCE" != "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "apm.yml already pinned to ${{ steps.latest.outputs.short_sha }} — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Update needed: ${CURRENT:-<none>} → ${{ steps.latest.outputs.short_sha }}"
          fi

      # ── Regenerate apm.yml at the new SHA ────────────────────────────────
      #    Script clones microsoft/hve-core at the SHA, rewrites all entries,
      #    and auto-detects the owner for squad paths from git remote.
      - name: Regenerate apm.yml dependencies
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HVE_CORE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(-Ref "${{ steps.latest.outputs.sha }}")
          [[ "${{ inputs.dry_run }}" == "true" ]] && ARGS+=(-DryRun)
          pwsh scripts/Update-ApmDependencies.ps1 "${ARGS[@]}"

      # ── Ensure apm.yml author matches this repo's owner ──────────────────
      - name: Set apm.yml author
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != 'true'
        run: |
          OWNER="${{ github.repository_owner }}"
          sed -i "s/^author: .*/author: $OWNER/" apm.yml
          echo "author set to: $OWNER"

      # ── Commit and push ───────────────────────────────────────────────────
      - name: Commit and push
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add apm.yml apm.lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(deps): update hve-core pin to ${{ steps.latest.outputs.short_sha }}"
            git push origin main
            echo "::notice::Pushed hve-core update to ${{ steps.latest.outputs.short_sha }}"
          else
            echo "::notice::No changes after regeneration — nothing to commit."
          fi
